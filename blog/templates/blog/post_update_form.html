{% extends "blog/base_blog.html" %}

{% block title %}
	Edit Post
{% endblock title %}

{% block content %}
	<form class="" action="{{ post.get_update_url }}" method="post">
		{% csrf_token %}
		{% for field in form %}
			<div class="form-group">
				{% if fiel.errors %}
					<div class="alert alert-danger">
						{{field.errors}}
					</div>
				{% endif %}
				{{field.label}}
				{{field}}
			</div>
		{% endfor %}
		<button type="submit" name="button" class="btn btn-primary">Update Post</button>
	</form>
{% endblock content %}
