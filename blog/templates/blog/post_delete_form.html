{% extends "blog/base_blog.html" %}

{% block title %}
	Delete post {{ post.title|title }}
{% endblock title %}

{% block content %}
	<form action="{{ post.get_delete_url }}" method="post">
		{% csrf_token %}
		<h3>Are you sure want to delete <b>"{{ post.title|title }}"</b> post?</h3>
		<a href="{{ post.get_absolute_url }}"><button class="btn btn-danger">Cancel</button></a>
		<button type="submit" name="button" class="btn btn-danger">Delete</button>
	</form>
{% endblock content %}
