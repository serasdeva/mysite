{% extends 'base.html' %}

{% block title %}
	{{title}}
{% endblock title %}

{% block content %}
	{% for post in posts %}
		<div class="card mb-4">
		<div class="card-header">
			{{post.date}}
		</div>
		<div class="card-body">
			<h5 class="card-title">{{post.title}}</h5>
			<p class="card-text">{{post.body|truncatewords:10}}</p>
			<a href="{{ post.get_absolute_url }}" class="btn btn-light">Read</a>
			{{post.tag}}
		</div>
		</div>
	{% endfor %}
{% endblock content %}
